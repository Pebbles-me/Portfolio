<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adrian Ieong — Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e1e;
      --text: #f0f0f0;
      --accent: #ffcc00;
      --stripe: #2a2a2a;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    /* Subtle construction stripe at top and bottom */
    .stripe {
      position: fixed;
      left: 0; right: 0;
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        var(--accent) 0px, var(--accent) 12px,
        #1e1e1e 12px, #1e1e1e 24px
      );
    }
    .stripe.top { top: 0; }
    .stripe.bottom { bottom: 0; }

    /* Robot SVG container */
    .robot-wrap {
      margin-bottom: 32px;
      animation: float 3.5s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    /* Blinking eye animation */
    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.08); }
    }

    .eye-left, .eye-right {
      animation: blink 4s infinite;
      transform-origin: center;
    }
    .eye-right { animation-delay: 0.08s; }

    /* Gear spin */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .gear {
      animation: spin 6s linear infinite;
      transform-origin: 50% 50%;
    }

    /* Text block */
    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .label {
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.85;
    }

    h1 {
      font-size: clamp(18px, 4vw, 28px);
      font-weight: 500;
      letter-spacing: 0.08em;
      line-height: 1.5;
      color: var(--text);
    }

    h1 span {
      display: block;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--accent);
      margin-left: 4px;
      vertical-align: middle;
      animation: cursor-blink 1.1s step-end infinite;
    }

    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .sub {
      margin-top: 18px;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #666;
      font-weight: 300;
    }
  </style>
</head>
<body>

  <div class="stripe top"></div>
  <div class="stripe bottom"></div>

  <!-- Robot SVG -->
  <div class="robot-wrap">
    <svg width="140" height="180" viewBox="0 0 140 180" fill="none" xmlns="http://www.w3.org/2000/svg">

      <!-- Hard hat brim -->
      <ellipse cx="70" cy="42" rx="46" ry="8" fill="#ffcc00"/>
      <!-- Hard hat dome -->
      <path d="M30 42 Q30 8 70 8 Q110 8 110 42 Z" fill="#ffcc00"/>
      <!-- Hard hat stripe -->
      <path d="M35 38 Q70 22 105 38" stroke="#e6b800" stroke-width="3" fill="none" stroke-linecap="round"/>
      <!-- Hat rim shadow line -->
      <ellipse cx="70" cy="42" rx="46" ry="8" fill="none" stroke="#c9a200" stroke-width="1.5"/>

      <!-- Antenna -->
      <line x1="70" y1="8" x2="70" y2="0" stroke="#aaa" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="70" cy="-1" r="3.5" fill="#ff6b6b"/>

      <!-- Head -->
      <rect x="28" y="44" width="84" height="62" rx="12" fill="#3a3a3a" stroke="#555" stroke-width="1.5"/>

      <!-- Eyes group (blink handled per element) -->
      <g class="eye-left" style="transform-box: fill-box; transform-origin: center;">
        <rect x="38" y="57" width="24" height="20" rx="5" fill="#111"/>
        <rect x="42" y="61" width="16" height="12" rx="3" fill="#4fc3f7"/>
        <circle cx="52" cy="68" r="4" fill="#0288d1"/>
        <circle cx="54" cy="66" r="1.5" fill="white"/>
      </g>
      <g class="eye-right" style="transform-box: fill-box; transform-origin: center;">
        <rect x="78" y="57" width="24" height="20" rx="5" fill="#111"/>
        <rect x="82" y="61" width="16" height="12" rx="3" fill="#4fc3f7"/>
        <circle cx="92" cy="68" r="4" fill="#0288d1"/>
        <circle cx="94" cy="66" r="1.5" fill="white"/>
      </g>

      <!-- Mouth -->
      <rect x="50" y="84" width="40" height="12" rx="6" fill="#222" stroke="#555" stroke-width="1"/>
      <rect x="53" y="87" width="7" height="6" rx="2" fill="#4fc3f7" opacity="0.7"/>
      <rect x="63" y="87" width="7" height="6" rx="2" fill="#4fc3f7" opacity="0.7"/>
      <rect x="73" y="87" width="7" height="6" rx="2" fill="#4fc3f7" opacity="0.7"/>
      <rect x="83" y="87" width="5" height="6" rx="2" fill="#4fc3f7" opacity="0.4"/>

      <!-- Neck -->
      <rect x="60" y="106" width="20" height="10" rx="4" fill="#444"/>

      <!-- Body -->
      <rect x="24" y="116" width="92" height="56" rx="14" fill="#2d2d2d" stroke="#555" stroke-width="1.5"/>

      <!-- Chest panel -->
      <rect x="38" y="126" width="64" height="36" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="1"/>

      <!-- Spinning gear on chest -->
      <g class="gear" style="transform-box: fill-box; transform-origin: 70px 144px;">
        <circle cx="70" cy="144" r="10" fill="none" stroke="#ffcc00" stroke-width="2.5"/>
        <circle cx="70" cy="144" r="4" fill="#ffcc00"/>
        <!-- Gear teeth -->
        <rect x="68.5" y="131" width="3" height="5" rx="1" fill="#ffcc00"/>
        <rect x="68.5" y="152" width="3" height="5" rx="1" fill="#ffcc00"/>
        <rect x="57" y="142.5" width="5" height="3" rx="1" fill="#ffcc00"/>
        <rect x="78" y="142.5" width="5" height="3" rx="1" fill="#ffcc00"/>
        <rect x="60" y="134" width="3" height="5" rx="1" transform="rotate(45 61.5 136.5)" fill="#ffcc00"/>
        <rect x="77" y="134" width="3" height="5" rx="1" transform="rotate(-45 78.5 136.5)" fill="#ffcc00"/>
        <rect x="60" y="152" width="3" height="5" rx="1" transform="rotate(-45 61.5 154.5)" fill="#ffcc00"/>
        <rect x="77" y="152" width="3" height="5" rx="1" transform="rotate(45 78.5 154.5)" fill="#ffcc00"/>
      </g>

      <!-- Status light -->
      <circle cx="95" cy="135" r="4" fill="#4caf50">
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </circle>

      <!-- Arms -->
      <rect x="4" y="118" width="20" height="42" rx="10" fill="#3a3a3a" stroke="#555" stroke-width="1.5"/>
      <rect x="116" y="118" width="20" height="42" rx="10" fill="#3a3a3a" stroke="#555" stroke-width="1.5"/>
      <!-- Hands -->
      <circle cx="14" cy="163" r="9" fill="#444" stroke="#555" stroke-width="1.5"/>
      <circle cx="126" cy="163" r="9" fill="#444" stroke="#555" stroke-width="1.5"/>

      <!-- Legs -->
      <rect x="38" y="170" width="24" height="10" rx="5" fill="#3a3a3a" stroke="#555" stroke-width="1"/>
      <rect x="78" y="170" width="24" height="10" rx="5" fill="#3a3a3a" stroke="#555" stroke-width="1"/>
    </svg>
  </div>

  <!-- Text content -->
  <div class="content">
    <div class="label">// status: wip</div>
    <h1>
      <span>site under construction,</span>
      <span>building in progress<span class="cursor"></span></span>
    </h1>
    <p class="sub">adrianieong.com &nbsp;·&nbsp; check back soon</p>
  </div>

</body>
</html>
